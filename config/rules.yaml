rules:
  - id: PORT_SCAN
    name: Port scan
    category: scan
    severity: HIGH
    enabled: true
    threshold: 20
    time_window: 10
    description: Detects one source scanning many ports on the same target.
  - id: SYN_FLOOD
    name: SYN flood
    category: flood
    severity: HIGH
    enabled: true
    threshold: 100
    time_window: 10
    description: Detects high-volume TCP SYN requests in a short time window.
  - id: ICMP_FLOOD
    name: ICMP flood
    category: flood
    severity: MEDIUM
    enabled: true
    threshold: 50
    time_window: 10
    description: Detects high-volume ICMP packets in a short time window.
  - id: SENSITIVE_PORT
    name: Sensitive port access
    category: policy
    severity: MEDIUM
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects access to common sensitive service ports.
  - id: BLACKLIST_IP
    name: Blacklisted IP
    category: reputation
    severity: HIGH
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects traffic that matches local blacklisted IP addresses.
  - id: BRUTE_FORCE
    name: Brute force connection
    category: authentication
    severity: HIGH
    enabled: true
    threshold: 10
    time_window: 10
    description: Detects repeated connections to authentication services.
  - id: DNS_ANOMALY
    name: DNS anomaly
    category: dns
    severity: MEDIUM
    enabled: true
    threshold: 40
    time_window: 60
    description: Detects high-frequency DNS queries, long domains and DGA-like names.
  - id: HTTP_SUSPICIOUS
    name: Suspicious HTTP request
    category: web
    severity: HIGH
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects traversal, SSRF, file inclusion and suspicious admin paths.
  - id: SQL_INJECTION
    name: SQL injection
    category: web
    severity: CRITICAL
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects SQL injection patterns in HTTP traffic.
  - id: XSS
    name: XSS
    category: web
    severity: HIGH
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects cross-site scripting patterns in HTTP traffic.
  - id: MALICIOUS_COMMAND
    name: Malicious command
    category: web
    severity: CRITICAL
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects command execution, reverse shell and download-execute patterns.
  - id: ABNORMAL_OUTBOUND
    name: Abnormal outbound traffic
    category: behavior
    severity: HIGH
    enabled: true
    threshold: 4
    time_window: 300
    description: Detects unusual public outbound ports and fixed heartbeat intervals.
  - id: LATERAL_MOVEMENT
    name: Lateral movement
    category: behavior
    severity: CRITICAL
    enabled: true
    threshold: 5
    time_window: 60
    description: Detects internal movement through SMB, RPC, RDP, SSH, WinRM and admin shares.
  - id: HOST_SCAN
    name: Host scan
    category: scan
    severity: HIGH
    enabled: true
    threshold: 30
    time_window: 10
    description: Detects one source contacting many destination hosts quickly.
  - id: TLS_FINGERPRINT
    name: TLS fingerprint risk
    category: tls
    severity: HIGH
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects weak TLS versions, weak ciphers and suspicious certificate indicators.
  - id: ML_ANOMALY
    name: ML anomaly score
    category: behavior
    severity: MEDIUM
    enabled: true
    threshold: 80
    time_window: 0
    description: Uses a lightweight anomaly score based on packet size, protocol and port features.
  - id: WEB_ATTACK
    name: Web attack (advanced)
    category: web
    severity: HIGH
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects traversal, command injection, SSRF, file inclusion, XXE, SSTI, deserialization, webshell and sensitive file discovery.
  - id: ML_FLOW_ANOMALY
    name: ML flow anomaly
    category: behavior
    severity: MEDIUM
    enabled: true
    threshold: 92
    time_window: 60
    description: Uses flow-level features with IsolationForest or a lightweight fallback model to detect anomalous host behavior.
  - id: SIGNATURE_MATCH
    name: External signature match
    category: signature
    severity: HIGH
    enabled: true
    threshold: 1
    time_window: 0
    description: Detects packets matching the external defensive signature library.
  - id: BASELINE_DEVIATION
    name: Baseline deviation
    category: behavior
    severity: HIGH
    enabled: true
    threshold: 3
    time_window: 60
    description: Detects hosts whose activity exceeds historical packet, destination, port or byte baselines.
  - id: BANDWIDTH_SPIKE
    name: Bandwidth spike
    category: behavior
    severity: HIGH
    enabled: true
    threshold: 8
    time_window: 60
    description: Detects hosts whose byte volume sharply exceeds their historical baseline.
  - id: SESSION_DURATION_ANOMALY
    name: Session duration anomaly
    category: behavior
    severity: MEDIUM
    enabled: true
    threshold: 3
    time_window: 600
    description: Detects sessions that last much longer than the host historical average.
